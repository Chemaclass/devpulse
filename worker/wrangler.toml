# Cloudflare Worker that gives DevPulse dynamic Open Graph previews.
#
# Why a worker? GitHub Pages serves a single static index.html with fixed
# og: meta tags, so a shared link like ?u=torvalds always unfurls the same
# generic card. This worker sits in front of the site (on a custom domain),
# injects per-user og:title / og:image into the HTML, and renders the image
# at /og?u=<login>.
#
# Deploy:
#   cd worker && npm install && npx wrangler deploy
#
# After deploy the worker is live at
#   https://devpulse-og.<your-subdomain>.workers.dev/?u=<login>
# SHARE THAT URL (not the github.io one) to get per-user link previews:
# only the worker injects per-user og:title/og:description/og:image. Plain
# github.io links always unfurl the generic default card.
#
# For a nicer URL, add a custom domain route below and share that instead, e.g.
#   routes = [{ pattern = "devpulse.example.com", custom_domain = true }]
# Pages stays the origin (SITE below).

name = "devpulse-og"
main = "src/index.ts"
compatibility_date = "2024-11-01"
workers_dev = true

[vars]
# The static GitHub Pages origin the worker proxies and screenshots.
SITE = "https://chemaclass.github.io/devpulse"
